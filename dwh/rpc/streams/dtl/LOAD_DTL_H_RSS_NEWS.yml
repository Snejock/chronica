input:
  redpanda:
    seed_brokers: ["dwh-rp-1:9092"]
    topics: ["stg_rss_news"]
    consumer_group: "LOAD_DTL_H_RSS_NEWS"

pipeline:
  processors:
    - schema_registry_decode:
        url: "http://dwh-rp-1:8081"
    - catch:
        - log:
            level: ERROR
            message: "Error decoding avro: ${! error() }"

    # выполнение проверки, была ли новость обработана ранее
    - branch:
        processors:
          - try:
              - cache:
                  resource: redis_cache
                  operator: get
                  key: "processed:dtl.h_rss_news:${! this.link.string() }"
        result_map: 'meta is_processed = content().string().catch("")'

    - mapping: |
        root = if meta("is_processed").or("") != "" { deleted() } else { this }        

output:
  broker:
    pattern: fan_out
    outputs:
    - sql_raw:
        driver: postgres
        dsn: postgres://${PG_USER}:${PG_PASSWORD}@${PG_HOST}:${PG_PORT}/${PG_DATABASE}?sslmode=disable
        query: |
          INSERT INTO dtl.h_rss_news (
            _source_system, news_id, news_link, published_utc, feed_id
          ) VALUES (
            $1,
            xxh64($2),
            $2,
            to_timestamp($3),
            $4
          ) ON CONFLICT (news_id) DO NOTHING;
        args_mapping: |
          let pub = this.published_utc.number().or(0)
          let pub_seconds = if $pub > 5000000000 { $pub / 1000 } else { $pub }
          
          root = [
            this.source_system.string().or(""),
            this.link.string().or(""),
            $pub_seconds,
            this.feed_id.number().or(0)
          ]
        batching:
          count: 100
          period: 1s

    - cache:
        target: redis_cache
        key: "processed:dtl.h_rss_news:${! this.link.string() }"